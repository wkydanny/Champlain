    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function showHome() {
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('folder-view').style.display = 'none';
        if(document.getElementById('sidebar').classList.contains('active')) toggleMenu();
        window.scrollTo(0,0);
    }

	function openFolder(folderId) {
        const folder = folders.find(f => f.id === folderId);
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('folder-view').style.display = 'block';
        
        document.getElementById('current-folder-name').innerText = folder.name;
        document.getElementById('note-content').innerText = folder.note;
        
        const listContainer = document.getElementById('file-list');
        listContainer.innerHTML = '';
		
		const timestamp = new Date().getTime();
        
        folder.files.forEach(file => {
            // Check file.name since your data uses objects
            if(file.name.toLowerCase() !== 'readme.txt') {
                const item = document.createElement('div');
                item.className = 'file-item';
                
                // Use file.url from your data to create the fresh link
                const freshUrl = file.url.includes('?') ? `${file.url}&v=${timestamp}` : `${file.url}?v=${timestamp}`;

                item.innerHTML = `
                    <span>📄 ${file.name}</span> 
                    <a href="${freshUrl}" 
                       target="_blank" 
                       style="color: var(--primary-blue); font-weight: bold; text-decoration: none;"
                    >download</a>`;
                    
                listContainer.appendChild(item);
            }
        });

        if(document.getElementById('sidebar').classList.contains('active')) toggleMenu();
        window.scrollTo(0,0);
    }

    function init() {
        const grid = document.getElementById('folder-grid');
        const sidebarLinks = document.getElementById('sidebar-links');

        folders.forEach(folder => {
            const card = document.createElement('div');
            card.className = 'folder-card';
            card.onclick = () => openFolder(folder.id);
            card.innerHTML = `
                <div class="folder-icon">📁</div>
                <div class="folder-name" style="font-weight: bold; font-size: 0.85rem;">${folder.name}</div>
            `;
            grid.appendChild(card);

            const link = document.createElement('a');
            link.href = "#";
            link.innerText = folder.name;
            link.onclick = (e) => { e.preventDefault(); openFolder(folder.id); };
            sidebarLinks.appendChild(link);
        });
    }

    init();
</script>
